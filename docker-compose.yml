# =============================================================================
# Lightning Data Pipeline — Docker Compose (Full Stack)
# =============================================================================
# All components containerized:
#   1. MariaDB       — Event storage
#   2. db-init       — One-shot schema initialization
#   3. lightning-api  — REST API for querying events
#   4. lightning-collector — Sensor daemon (requires Raspberry Pi hardware)
#
# First-deployment behavior:
#   - MariaDB creates the database + user from MARIADB_* env vars
#   - db-init waits for MariaDB, creates the events table, then exits
#   - API and Collector wait for db-init, validate their environment, then start
#
# HARDWARE REQUIREMENT (collector only):
#   The collector container needs direct access to the Raspberry Pi's I2C bus
#   and GPIO pins. This compose file passes through /dev/i2c-1, /dev/gpiochip0,
#   and /dev/gpiomem. It will ONLY work on a Raspberry Pi (or compatible SBC)
#   with I2C enabled and the AS3935 sensor wired to the GPIO header.
#
# Usage:
#   cp .env.sample .env   # Edit with your values
#   docker compose up -d
#   docker compose logs -f
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MariaDB — Event database
  # ---------------------------------------------------------------------------
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    env_file: .env
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${LIGHTNING_DB_NAME}
      MARIADB_USER: ${LIGHTNING_DB_USER}
      MARIADB_PASSWORD: ${LIGHTNING_DB_PASSWORD}
    ports:
      - "${LIGHTNING_DB_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - lightning-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # DB Init — One-shot schema setup (runs once, then exits)
  # ---------------------------------------------------------------------------
  db-init:
    build: .
    env_file: .env
    command: ["db-init"]
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - lightning-net
    restart: "no"

  # ---------------------------------------------------------------------------
  # Lightning REST API — Serves event data over HTTP
  # ---------------------------------------------------------------------------
  lightning-api:
    build: .
    env_file: .env
    command: ["api"]
    ports:
      - "${LIGHTNING_API_PORT:-8000}:${LIGHTNING_API_PORT:-8000}"
    depends_on:
      db-init:
        condition: service_completed_successfully
    networks:
      - lightning-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Lightning Collector — Sensor daemon (Raspberry Pi only)
  # ---------------------------------------------------------------------------
  # This service requires physical hardware access. It passes through the
  # I2C bus and GPIO character devices from the host into the container.
  #
  # Prerequisites on the host Raspberry Pi:
  #   - I2C enabled: sudo raspi-config → Interface Options → I2C
  #   - Kernel modules loaded: i2c-dev, i2c-bcm2835
  #   - AS3935 sensor wired to I2C1 (SDA=BCM2, SCL=BCM3) + IRQ on BCM4
  #   - User in i2c/gpio groups or devices world-readable
  #
  # If you're NOT running on a Pi (e.g., developing on x86), comment out
  # or remove this entire service block.
  # ---------------------------------------------------------------------------
  lightning-collector:
    build: .
    env_file: .env
    command: ["collector"]
    depends_on:
      db-init:
        condition: service_completed_successfully
    devices:
      # I2C bus — required for sensor communication
      - "/dev/i2c-${LIGHTNING_SENSOR_I2C_BUS:-1}:/dev/i2c-${LIGHTNING_SENSOR_I2C_BUS:-1}"
      # GPIO character device — required for interrupt edge detection (gpiozero/lgpio)
      - "/dev/gpiochip0:/dev/gpiochip0"
      # GPIO memory device — fallback for some pin factories
      - "/dev/gpiomem:/dev/gpiomem"
    # Map host group IDs for device access without running as root
    group_add:
      - "${I2C_GID:-998}"
      - "${GPIO_GID:-997}"
    volumes:
      - lightning_csv:/var/lib/lightning
    networks:
      - lightning-net
    restart: unless-stopped
    # Disable the HTTP healthcheck (collector has no HTTP endpoint)
    healthcheck:
      disable: true

volumes:
  mariadb_data:
  lightning_csv:

networks:
  lightning-net:
    driver: bridge
